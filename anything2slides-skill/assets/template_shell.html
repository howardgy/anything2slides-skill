<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{TITLE}}</title>
  <meta name="description" content="HTML presentation rebuilt from {{SOURCE_FILE}}">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/reveal.js/5.0.4/reveal.min.css">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="source-{{SOURCE_TYPE}}">
  <div class="reveal">
    <div class="slides">
{{SLIDES}}
    </div>
  </div>

  <button id="settings-toggle" title="设置">&#9881;</button>

  <div id="settings-panel">
    <h4>设置</h4>
    <button class="close-btn" id="settings-close">&times;</button>

    <div class="setting-section">
      <div class="setting-section-title">外观</div>
      <div class="setting-row">
        <label>主题</label>
        <div class="toggle-switch">
          <input type="checkbox" id="theme-toggle">
          <label for="theme-toggle"></label>
        </div>
        <span class="range-val" id="theme-label">浅色</span>
      </div>
    </div>

    <div class="setting-section">
      <div class="setting-section-title">文字与图片</div>
      <div class="setting-row">
        <label>字体</label>
        <select id="font-select">
          <option value="manrope" selected>现代无衬线</option>
          <option value="serif">衬线</option>
          <option value="system">系统字体</option>
        </select>
      </div>
      <div class="setting-row">
        <label>字号</label>
        <div class="stepper-group">
          <button type="button" class="step-btn" id="font-size-decrease" aria-label="减小字号">-</button>
          <input type="range" id="font-size-slider" min="70" max="140" value="100" step="5">
          <button type="button" class="step-btn" id="font-size-increase" aria-label="增大字号">+</button>
        </div>
        <span class="range-val" id="font-size-value">100%</span>
      </div>
      <div class="setting-row">
        <label>图片比例</label>
        <div class="stepper-group">
          <button type="button" class="step-btn" id="fig-scale-decrease" aria-label="减小图片">-</button>
          <input type="range" id="fig-scale-slider" min="50" max="200" value="100" step="10">
          <button type="button" class="step-btn" id="fig-scale-increase" aria-label="增大图片">+</button>
        </div>
        <span class="range-val" id="fig-scale-value">100%</span>
      </div>
    </div>

    <div class="setting-section">
      <div class="setting-section-title">放映</div>
      <div class="setting-row">
        <label>切换</label>
        <select id="transition-select">
          <option value="none" selected>无</option>
          <option value="slide">滑动</option>
          <option value="fade">淡入淡出</option>
        </select>
      </div>
      <div class="setting-row">
        <label>进度条</label>
        <div class="toggle-switch">
          <input type="checkbox" id="progress-toggle" checked>
          <label for="progress-toggle"></label>
        </div>
      </div>
      <div class="setting-row">
        <label>翻页按钮</label>
        <div class="toggle-switch">
          <input type="checkbox" id="controls-toggle" checked>
          <label for="controls-toggle"></label>
        </div>
      </div>
    </div>

    <div class="settings-actions">
      <button id="btn-overview">缩略图</button>
      <button id="btn-fullscreen">全屏</button>
      <button id="btn-reset" class="reset">重置</button>
    </div>
  </div>

  <div id="presenter-hint" aria-live="polite">
    按 <kbd>S</kbd> 进入演讲者模式
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/reveal.js/5.0.4/reveal.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/reveal.js/5.0.4/plugin/notes/notes.min.js"></script>
  <script>
    Reveal.initialize({
      hash: true,
      slideNumber: 'c/t',
      showSlideNumber: 'all',
      transition: 'none',
      transitionSpeed: 'fast',
      width: {{REVEAL_WIDTH}},
      height: {{REVEAL_HEIGHT}},
      margin: 0.04,
      center: false,
      progress: true,
      controls: true,
      controlsLayout: 'bottom-right',
      plugins: [RevealNotes]
    });

    (function () {
      const KEY = 'anything2slides_skill_settings';
      const FONTS = {
        manrope: "'Manrope', 'Avenir Next', sans-serif",
        serif: "'Source Serif 4', Georgia, serif",
        system: "-apple-system, BlinkMacSystemFont, sans-serif"
      };
      const defaults = {
        theme: 'light',
        font: 'manrope',
        fontScale: 100,
        figScale: 100,
        transition: 'none',
        progress: true,
        controls: true
      };

      const el = id => document.getElementById(id);
      const load = () => {
        try {
          return { ...defaults, ...JSON.parse(localStorage.getItem(KEY)) };
        } catch {
          return { ...defaults };
        }
      };
      const save = s => localStorage.setItem(KEY, JSON.stringify(s));

      function apply(s) {
        document.documentElement.setAttribute('data-theme', s.theme);
        el('theme-toggle').checked = s.theme === 'dark';
        el('theme-label').textContent = s.theme === 'dark' ? '深色' : '浅色';

        const ff = FONTS[s.font] || FONTS.manrope;
        document.documentElement.style.setProperty('--font-heading', ff);
        document.documentElement.style.setProperty('--font-body', ff);
        el('font-select').value = s.font;

        document.documentElement.style.setProperty('--font-scale', s.fontScale / 100);
        el('font-size-slider').value = s.fontScale;
        el('font-size-value').textContent = s.fontScale + '%';

        document.documentElement.style.setProperty('--fig-scale', s.figScale / 100);
        el('fig-scale-slider').value = s.figScale;
        el('fig-scale-value').textContent = s.figScale + '%';

        Reveal.configure({ transition: s.transition, progress: s.progress, controls: s.controls });
        el('transition-select').value = s.transition;
        el('progress-toggle').checked = s.progress;
        el('controls-toggle').checked = s.controls;

        save(s);
      }

      let s = load();
      Reveal.on('ready', () => apply(s));

      const panel = el('settings-panel');
      const toggle = el('settings-toggle');
      const close = () => panel.classList.remove('open');

      toggle.addEventListener('click', e => { e.stopPropagation(); panel.classList.toggle('open'); });
      el('settings-close').addEventListener('click', close);
      document.addEventListener('keydown', e => {
        if (e.key === 'Escape') close();
        if (e.key === ',' && (e.ctrlKey || e.metaKey)) {
          e.preventDefault();
          panel.classList.toggle('open');
        }
      });
      document.addEventListener('click', e => {
        if (!panel.contains(e.target) && e.target !== toggle) close();
      });

      el('theme-toggle').addEventListener('change', e => { s.theme = e.target.checked ? 'dark' : 'light'; apply(s); });
      el('font-select').addEventListener('change', e => { s.font = e.target.value; apply(s); });
      el('font-size-slider').addEventListener('input', e => { s.fontScale = +e.target.value; apply(s); });
      el('fig-scale-slider').addEventListener('input', e => { s.figScale = +e.target.value; apply(s); });
      el('transition-select').addEventListener('change', e => { s.transition = e.target.value; apply(s); });
      el('progress-toggle').addEventListener('change', e => { s.progress = e.target.checked; apply(s); });
      el('controls-toggle').addEventListener('change', e => { s.controls = e.target.checked; apply(s); });

      function nudgeSlider(sliderId, key, direction) {
        const slider = el(sliderId);
        const step = Number(slider.step || 1);
        const min = Number(slider.min || 0);
        const max = Number(slider.max || 100);
        const current = Number(slider.value);
        const next = Math.max(min, Math.min(max, current + direction * step));
        s[key] = next;
        apply(s);
      }

      el('font-size-decrease').addEventListener('click', () => nudgeSlider('font-size-slider', 'fontScale', -1));
      el('font-size-increase').addEventListener('click', () => nudgeSlider('font-size-slider', 'fontScale', 1));
      el('fig-scale-decrease').addEventListener('click', () => nudgeSlider('fig-scale-slider', 'figScale', -1));
      el('fig-scale-increase').addEventListener('click', () => nudgeSlider('fig-scale-slider', 'figScale', 1));

      el('btn-overview').addEventListener('click', () => { Reveal.toggleOverview(); close(); });
      el('btn-fullscreen').addEventListener('click', () => {
        if (!document.fullscreenElement) document.documentElement.requestFullscreen().catch(() => {});
        else document.exitFullscreen();
        close();
      });
      el('btn-reset').addEventListener('click', () => {
        s = { ...defaults };
        apply(s);
        localStorage.removeItem('anything2slides_skill_figs');
        document.querySelectorAll('.figure-frame img').forEach(img => {
          img.style.transform = '';
        });
        document.querySelectorAll('.figure-frame[data-zoomed]').forEach(frame => {
          frame.removeAttribute('data-zoomed');
        });
      });

      const presenterHint = el('presenter-hint');
      window.setTimeout(() => {
        presenterHint.classList.add('show');
      }, 700);
      window.setTimeout(() => {
        presenterHint.classList.remove('show');
      }, 4300);
    })();

    (function () {
      document.querySelectorAll('.figure-frame[data-fig]').forEach(frame => {
        const id = frame.dataset.fig;
        const img = frame.querySelector('img');
        if (!img) return;
        img.setAttribute('title', img.alt || '点击可放大查看');
        img.addEventListener('dragstart', e => e.preventDefault());

        const toolbar = document.createElement('div');
        toolbar.className = 'figure-toolbar';
        toolbar.innerHTML = `
          <button data-act="lightbox" title="悬浮查看">&#x2922;</button>
        `;
        frame.appendChild(toolbar);

        toolbar.addEventListener('click', e => {
          const btn = e.target.closest('button');
          if (!btn) return;
          e.stopPropagation();
          if (btn.dataset.act === 'lightbox') {
            openLightbox(img.src, img.alt || '图片');
          }
        });

        img.addEventListener('dblclick', e => {
          e.stopPropagation();
          openLightbox(img.src, img.alt || '图片');
        });

        img.addEventListener('click', e => {
          e.stopPropagation();
          openLightbox(img.src, img.alt || '图片');
        });
      });

      function openLightbox(src, alt) {
        document.querySelectorAll('.figure-lightbox').forEach(node => node.remove());
        const lb = document.createElement('div');
        lb.className = 'figure-lightbox';
        lb.innerHTML = `
          <div class="figure-lightbox-toolbar">
            <button data-act="zoomin" title="放大">+</button>
            <button data-act="zoomout" title="缩小">&minus;</button>
            <button data-act="reset" title="还原">&circlearrowright;</button>
            <button data-act="close" class="lb-close" title="关闭">&times;</button>
          </div>
          <div class="figure-lightbox-stage">
            <img src="${src}" alt="${alt}">
          </div>
        `;
        document.body.appendChild(lb);
        const stage = lb.querySelector('.figure-lightbox-stage');
        const lightboxImg = lb.querySelector('img');
        const state = { s: 1, x: 0, y: 0 };
        let activePointerId = null;
        let didDrag = false;
        let isClosing = false;

        function applyTransform() {
          lightboxImg.style.transform = `translate3d(${state.x}px, ${state.y}px, 0) scale(${state.s})`;
        }

        function cleanup() {
          dragging = false;
          stage.classList.remove('dragging');
          activePointerId = null;
        }

        function closeLb() {
          if (isClosing) return;
          isClosing = true;
          cleanup();
          lb.classList.remove('visible');
          window.setTimeout(() => {
            lb.remove();
          }, 180);
        }

        function zoomAt(factor) {
          state.s = Math.max(0.4, Math.min(8, state.s * factor));
          if (state.s <= 1.02) {
            state.s = 1;
            state.x = 0;
            state.y = 0;
          }
          applyTransform();
        }

        lb.querySelector('.figure-lightbox-toolbar').addEventListener('click', e => {
          const btn = e.target.closest('button');
          if (!btn) return;
          e.stopPropagation();
          const act = btn.dataset.act;
          if (act === 'zoomin') zoomAt(1.2);
          if (act === 'zoomout') zoomAt(1 / 1.2);
          if (act === 'reset') {
            state.s = 1;
            state.x = 0;
            state.y = 0;
            applyTransform();
          }
          if (act === 'close') closeLb();
        });

        lb.addEventListener('click', e => {
          if (didDrag) {
            didDrag = false;
            return;
          }
          if (e.target === lb || e.target === stage) closeLb();
        });

        stage.addEventListener('wheel', e => {
          e.preventDefault();
          zoomAt(e.deltaY < 0 ? 1.1 : 1 / 1.1);
        }, { passive: false });

        let dragging = false;
        let startX = 0;
        let startY = 0;
        let originX = 0;
        let originY = 0;

        function beginDrag(clientX, clientY) {
          dragging = true;
          didDrag = false;
          startX = clientX;
          startY = clientY;
          originX = state.x;
          originY = state.y;
          stage.classList.add('dragging');
        }

        stage.addEventListener('pointerdown', e => {
          if (e.target.closest('.figure-lightbox-toolbar')) return;
          e.preventDefault();
          activePointerId = e.pointerId;
          stage.setPointerCapture(e.pointerId);
          beginDrag(e.clientX, e.clientY);
        });

        lightboxImg.addEventListener('dragstart', e => e.preventDefault());

        function updateDrag(clientX, clientY) {
          dragging = true;
          const dx = clientX - startX;
          const dy = clientY - startY;
          if (Math.abs(dx) > 2 || Math.abs(dy) > 2) {
            didDrag = true;
          }
          state.x = originX + dx;
          state.y = originY + dy;
          applyTransform();
        }

        stage.addEventListener('pointermove', e => {
          if (!dragging || activePointerId !== e.pointerId) return;
          e.preventDefault();
          updateDrag(e.clientX, e.clientY);
        });

        function endPointerDrag(e) {
          if (activePointerId !== e.pointerId) return;
          dragging = false;
          stage.classList.remove('dragging');
          if (stage.hasPointerCapture(e.pointerId)) {
            stage.releasePointerCapture(e.pointerId);
          }
          activePointerId = null;
        }

        stage.addEventListener('pointerup', endPointerDrag);
        stage.addEventListener('pointercancel', endPointerDrag);

        document.addEventListener('keydown', function esc(e) {
          if (e.key === 'Escape') {
            closeLb();
            document.removeEventListener('keydown', esc);
          }
        });

        lightboxImg.addEventListener('dblclick', () => {
          state.s = 1;
          state.x = 0;
          state.y = 0;
          applyTransform();
        });

        requestAnimationFrame(() => {
          lb.classList.add('visible');
        });

        applyTransform();
      }
    })();
  </script>
</body>
</html>
